<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love you Darling</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title" data-aos="fade-in" data-aos-duration="1500">Love you Darling</h1>
        <p class="subtitle" data-aos="fade-right" data-aos-duration="1500" data-aos-delay="500">But this is about to</p>
        <p class="subtitle-2" data-aos="fade-left" data-aos-duration="1500" data-aos-delay="1000">become a fight</p>
        
        <p class="instruction" data-aos="zoom-in" data-aos-duration="1000" data-aos-delay="1500">Press the button to find out how much it cost</p>
        <button class="love-btn" data-aos="zoom-in" data-aos-duration="800" data-aos-delay="2000">Love you</button>

        <!-- Cost items (hidden initially) -->
        <div class="cost-items">
            <p class="cost-item" data-item="0">1 Shilling</p>
            <p class="cost-item" data-item="1">1 Packet of Scampi Fries</p>
            <p class="cost-item" data-item="2">1 large fry from mcdonalds</p>
            <p class="cost-item" data-item="3">Cake</p>
        </div>

        <!-- Hearts container -->
        <div class="hearts-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
